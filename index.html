<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0ea5e9" id="theme-meta" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>SmartLife Assistant</title>
  <script>
    (function () {
      const theme = localStorage.getItem('smartlife_theme') || 'system';
      const root = document.documentElement;
      const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        root.classList.add('dark');
        root.style.colorScheme = 'dark';
      } else {
        root.classList.remove('dark');
        root.style.colorScheme = 'light';
      }
      
      // Dynamic update of mobile theme color
      const meta = document.getElementById('theme-meta');
      if (meta) {
        meta.setAttribute('content', isDark ? '#0B0F19' : '#0ea5e9');
      }
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #F3F4F6;
    }

    /* Custom Scrollbar for Chat */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <script>
    // Tự động hủy đăng ký Service Worker và xóa Cache trên localhost để tránh lỗi đọng cache của PWA khi phát triển
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function (success) {
              if (success) {
                console.log('[Dev Cache Clean] Đã hủy đăng ký Service Worker thành công:', registration.active?.scriptURL);
              }
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function (names) {
          for (let name of names) {
            caches.delete(name).then(function (success) {
              if (success) {
                console.log('[Dev Cache Clean] Đã xóa bộ nhớ cache:', name);
              }
            });
          }
        });
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
